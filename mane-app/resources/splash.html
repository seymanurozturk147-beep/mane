<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>MANE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* Tam ekran sıcak şeftali  beyazlık yok, kutu yok */
            background-color: #FFF9F2;
            background-image: radial-gradient(circle, rgba(231,111,81,0.13) 1px, transparent 1px);
            background-size: 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            /* İnce yuvarlak köşe  transparent pencereyle çalışır */
            border-radius: 12px;
        }

        /* Giriş animasyonu */
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeUp 0.5s ease-out both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Babaanne avatar */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 3.5px solid rgba(220,120,40,0.45);
            box-shadow:
                0 0 0 7px rgba(244,162,97,0.15),
                0 8px 28px rgba(200,100,30,0.26);
            background: #FDDCB0;
            margin-bottom: 18px;
            animation: breathe 3s ease-in-out infinite;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 7px rgba(244,162,97,0.15), 0 8px 28px rgba(200,100,30,0.24); }
            50%      { box-shadow: 0 0 0 11px rgba(244,162,97,0.22), 0 12px 40px rgba(200,100,30,0.34); }
        }

        /* MANE başlık */
        .app-name {
            font-size: 2.7rem;
            font-weight: 900;
            letter-spacing: 0.22em;
            color: #5C3A21;
            line-height: 1;
            margin-bottom: 22px;
        }

        /* Yükleme metni */
        .loading-text {
            font-size: 0.8rem;
            color: rgba(92,58,33,0.52);
            font-style: italic;
            font-weight: 500;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.45; }
            50%      { opacity: 1; }
        }

        /* Spinner */
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(244,162,97,0.22);
            border-top-color: #F4A261;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
